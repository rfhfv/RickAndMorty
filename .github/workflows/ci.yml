name: CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          xcodebuild \
            -scheme RickAndMorty \
            -destination "generic/platform=iOS Simulator" \
            clean build \
            2>&1 | grep -E "error:|warning:|BUILD"